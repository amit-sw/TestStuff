<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Transformer models</title>
  <style>
    :root {
      --bg: #eef3f8;
      --panel: #ffffff;
      --line: #c7d2e0;
      --muted: #586a7f;
      --text: #151b23;
      --accent: #1e5d91;
      --accent-soft: #eaf4ff;
      --good: #2f7f63;
      --good-soft: #ebf8f2;
      --warn: #9a5a1f;
      --warn-soft: #fff3e8;
      --shadow: 0 12px 28px rgba(17, 35, 56, 0.12);
      --radius-lg: 14px;
      --radius-md: 10px;
      --radius-sm: 8px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --sans: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(72rem 32rem at 10% -20%, #dcecff 0%, transparent 52%),
        radial-gradient(58rem 30rem at 96% 0%, #f7dfce 0%, transparent 48%),
        linear-gradient(180deg, #f8fbff 0%, #edf3f8 100%);
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .header {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      background: linear-gradient(120deg, rgba(255,255,255,0.95), rgba(235,246,255,0.9));
    }

    .header h1 {
      margin: 0;
      font-size: clamp(1.1rem, 1.8vw, 1.5rem);
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid #b7c8da;
      background: #fff;
      color: #26425f;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
    }

    .controls {
      padding: 6px;
      display: grid;
      gap: 6px;
    }

    .controls.collapsed {
      display: none;
    }

    .controls-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(80px, 1fr));
      column-gap: 6px;
      row-gap: 4px;
      align-items: end;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 2px 2px 4px;
    }

    .preset-btn {
      border: 1px solid #b7c8da;
      background: #f5f9ff;
      color: #23425f;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.9rem;
      font-family: var(--mono);
      cursor: pointer;
    }

    .preset-btn.active {
      background: #2d5f92;
      color: #fff;
      border-color: #224e79;
    }

    label {
      display: grid;
      gap: 2px;
      font-size: 0.7rem;
      color: var(--muted);
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      min-height: 30px;
      padding: 5px 7px;
      border: 1px solid #c0cddd;
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.74rem;
    }

    input[readonly] {
      background: #f6f9fc;
    }

    .controls-grid input[type="number"],
    .controls-grid input[type="text"] {
      width: 48%;
      min-width: 72px;
      max-width: 108px;
      min-height: 26px;
      padding: 3px 5px;
      font-size: 0.7rem;
    }

    .toggle-cell {
      display: grid;
      gap: 2px;
      align-content: end;
      font-size: 0.7rem;
      color: var(--muted);
    }

    .pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      font-family: var(--mono);
      font-size: 0.66rem;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid #b8cada;
      background: #f4f9ff;
      color: #2d4d6a;
    }

    .pill.warn {
      border-color: #e5bfa4;
      background: var(--warn-soft);
      color: var(--warn);
    }

    .pill-toggle {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 1px 4px;
      border-radius: 999px;
      border: 1px solid #b8cada;
      background: #f4f9ff;
      color: #2d4d6a;
      font-family: var(--mono);
      font-size: 0.5rem;
      user-select: none;
    }

    .pill-toggle input[type="checkbox"] {
      width: 8px;
      min-width: 8px;
      max-width: 8px;
      min-height: 8px;
      margin: 0;
      accent-color: #2d5f92;
    }

    body.params-off .dim-pill,
    body.params-off .pos-eqn-pill,
    body.params-off .attn-eqn-pill,
    body.params-off .mix-eqn-pill,
    body.params-off .pred-eqn-pill,
    body.params-off .unembed-eqn-bar,
    body.params-off .stage-metrics {
      display: none;
    }

    .diagram {
      padding: 10px;
      display: grid;
      gap: 10px;
      overflow: auto;
      background: linear-gradient(180deg, #fcfdff 0%, #f4f9fd 100%);
    }

    .pipeline-shell {
      min-width: 1420px;
      border: 1px solid #c7d2e0;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, #fdfefe 0%, #f3f8fc 100%);
      padding: 10px;
    }

    .pipeline-svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .main-line {
      stroke: #4e7094;
      stroke-width: 18;
      stroke-linecap: round;
      opacity: 0.95;
    }

    .node {
      fill: #fff;
      stroke: #4e7094;
      stroke-width: 10;
    }

    .node-title {
      font-size: 15px;
      fill: #1c3551;
      font-family: var(--sans);
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .flow-arrow {
      font-size: 46px;
      fill: #dce7f3;
      font-family: var(--mono);
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .repeat-box {
      fill: none;
      stroke: #4e7094;
      stroke-width: 4;
    }

    .repeat-title {
      font-size: 22px;
      fill: #1d3d61;
      font-weight: 700;
      letter-spacing: 0.04em;
      font-family: var(--sans);
      text-anchor: middle;
    }

    .loop-arrow {
      fill: none;
      stroke: #4e7094;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .token-shell {
      fill: #ffffff;
      stroke: #203549;
      stroke-width: 2.3;
    }

    .token-cell-blue {
      fill: #60a7e5;
      stroke: #203549;
      stroke-width: 1.1;
    }

    .token-cell-orange {
      fill: #f4a431;
      stroke: #203549;
      stroke-width: 1.1;
    }

    .token-count {
      font-size: 15px;
      fill: #1a324a;
      font-family: var(--mono);
      text-anchor: middle;
    }

    .token-label {
      font-size: 12px;
      fill: #35506c;
      font-family: var(--sans);
      text-anchor: middle;
    }

    .prediction-title {
      font-size: 20px;
      fill: #1a324a;
      font-family: var(--sans);
      font-weight: 600;
      text-anchor: middle;
    }

    .prediction-token-box {
      fill: #ebf6ff;
      stroke: #4e7094;
      stroke-width: 2;
    }

    .prediction-token-text {
      font-size: 30px;
      fill: #12395a;
      font-family: var(--mono);
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
    }

    .metrics-row-label {
      font-family: var(--sans);
      font-size: 13px;
      fill: #35506c;
      font-weight: 700;
      text-anchor: end;
    }

    .metrics-value {
      font-family: var(--mono);
      font-size: 13px;
      fill: #223a52;
      text-anchor: middle;
    }

    .prediction-metric {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 800;
      fill: #1f3a54;
      text-anchor: middle;
    }

    .stage-hit {
      fill: transparent;
      stroke: transparent;
      stroke-width: 2;
      cursor: pointer;
      transition: stroke 0.2s ease;
    }

    .stage-group:hover .stage-hit {
      stroke: #a8c1da;
    }

    .stage-group {
      cursor: pointer;
    }

    .stage-group.active .stage-hit {
      stroke: #1e5d91;
    }

    .stage-group.active .node {
      fill: #eef7ff;
      stroke: #1e5d91;
    }

    .stage-group.active .repeat-box,
    .stage-group.active .loop-arrow {
      stroke: #1e5d91;
    }

    .details {
      min-width: 1420px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .details[hidden] {
      display: none;
    }

    .details h3 {
      margin: 0;
      font-size: 0.94rem;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 8px;
    }

    .detail-item {
      border: 1px solid #c9d6e4;
      border-radius: 8px;
      background: #f8fbff;
      padding: 8px;
      display: grid;
      gap: 5px;
    }

    .detail-item h4 {
      margin: 0;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.01em;
      color: #1a2f45;
    }

    .detail-item p {
      margin: 0;
      font-size: 0.71rem;
      color: var(--muted);
      font-family: var(--mono);
      line-height: 1.3;
      white-space: pre-line;
    }

    .input-detail-layout {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(760px, 2fr);
      gap: 12px;
      align-items: stretch;
    }

    .input-copy-pane {
      border: 1px solid #c6d4e1;
      border-radius: 10px;
      background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .copy-row {
      display: grid;
      gap: 6px;
    }

    .copy-tag {
      width: fit-content;
      padding: 2px 8px;
      border-radius: 4px;
      background: #54779a;
      color: #fff;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .copy-row p {
      margin: 0;
      color: #23364a;
      font-size: 0.9rem;
      line-height: 1.3;
    }

    .math-eq {
      font-family: var(--mono);
      font-size: 0.84rem;
      color: #1f3550;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      line-height: 1;
      white-space: nowrap;
    }

    .math-lhs {
      display: inline-flex;
      align-items: flex-end;
      gap: 4px;
      white-space: nowrap;
    }

    .math-frac {
      display: inline-flex;
      flex-direction: column;
      justify-items: center;
      align-items: center;
      line-height: 1;
      vertical-align: middle;
      min-width: max-content;
    }

    .math-frac .frac-line {
      width: 100%;
      min-width: 78px;
      border-top: 1.5px solid #35506f;
      margin: 2px 0;
    }

    .math-frac .num,
    .math-frac .den {
      white-space: nowrap;
      display: block;
      padding: 0 2px;
    }

    .input-visual-pane {
      border: 1px solid #b8cadd;
      border-radius: 10px;
      background: radial-gradient(120% 140% at 0% 0%, #ffffff 0%, #f6f9fe 48%, #eef4fb 100%);
      padding: 12px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .input-visual-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      color: #162f49;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .stage-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #4e7094;
      color: #fff;
      display: inline-grid;
      place-items: center;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 0.95rem;
      line-height: 1;
      flex: 0 0 auto;
    }

    .pos-visual-pane {
      background: radial-gradient(130% 150% at 0% 0%, #ffffff 0%, #f8f7ff 52%, #eef0fb 100%);
    }

    .pos-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pos-eqn-pill {
      padding: 8px 12px;
      border: 3px solid #4d6e93;
      border-radius: 999px;
      background: #f6faff;
      color: #203c58;
      font-family: var(--mono);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .embed-equation {
      border: 1px dashed #b8cadc;
      border-radius: 8px;
      background: #f8fbff;
      padding: 6px 8px;
      color: #214161;
      font-family: var(--mono);
      font-size: 0.82rem;
    }

    .embed-flow {
      display: grid;
      grid-template-columns: auto auto auto auto auto;
      align-items: center;
      gap: 12px;
    }

    .pos-flow {
      gap: 18px;
    }

    .token-vector {
      display: grid;
      justify-items: center;
      gap: 7px;
    }

    .token-vector-title {
      font-size: 0.74rem;
      text-transform: uppercase;
      color: #203f5f;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    .token-stack {
      width: 54px;
      height: 214px;
      border: 2px solid #203549;
      border-radius: 4px;
      background: #fff;
      padding: 4px 5px;
      display: grid;
      grid-template-rows: repeat(5, 1fr) 24px;
      gap: 3px;
    }

    .stack-cell {
      border: 1px solid #2b4f71;
      border-radius: 2px;
      background: #6aa7df;
      color: #0f2a44;
      font-family: var(--mono);
      font-size: 0.6rem;
      display: grid;
      place-items: center;
      line-height: 1;
    }

    .stack-cell.ellipsis {
      background: #e8f1fb;
      color: #496987;
      letter-spacing: 0.2em;
    }

    .stack-cell.tail {
      background: #f4ab3a;
    }

    .dim-pill {
      padding: 2px 6px;
      border: 1px solid #b4c7da;
      border-radius: 999px;
      background: #f4f9ff;
      color: #22435f;
      font-family: var(--mono);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .math-op {
      font-size: 2rem;
      color: #2f5274;
      font-family: var(--mono);
      font-weight: 700;
      line-height: 1;
      margin-top: -18px;
    }

    .matrix-wrap {
      display: grid;
      gap: 7px;
      justify-items: center;
    }

    .matrix-grid {
      border: 2px solid #2b4b6b;
      border-radius: 3px;
      background:
        linear-gradient(90deg, rgba(28, 48, 70, 0.42) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(rgba(28, 48, 70, 0.42) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(140deg, #7fa4ca 0%, #608ab4 55%, #5d84b1 100%);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.35);
    }

    .matrix-grid.lookup {
      width: 260px;
      height: 210px;
    }

    .matrix-grid.output {
      width: 250px;
      height: 210px;
      background:
        linear-gradient(90deg, rgba(28, 48, 70, 0.4) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(rgba(28, 48, 70, 0.4) 1px, transparent 1px) 0 0 / 34px 34px,
        linear-gradient(140deg, #86afd8 0%, #7098c4 58%, #5f88b4 100%);
    }

    .matrix-grid.purple {
      width: 210px;
      height: 210px;
      background:
        linear-gradient(90deg, rgba(29, 17, 57, 0.45) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(rgba(29, 17, 57, 0.45) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(140deg, #4e2690 0%, #3d1f76 55%, #2e155f 100%);
      border-color: #4a2d88;
    }

    .matrix-grid.output-purple {
      background:
        linear-gradient(90deg, rgba(24, 14, 45, 0.45) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(rgba(24, 14, 45, 0.45) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(140deg, #592ca2 0%, #4a248a 55%, #3a1b70 100%);
      border-color: #5a38a3;
    }

    .formula-card {
      width: 180px;
      height: 210px;
      border: 2px solid #3f5978;
      border-radius: 3px;
      background: #ffffff;
      overflow: hidden;
    }

    .formula-wave {
      width: 100%;
      height: 100%;
      display: block;
    }

    .matrix-name {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: #1d3953;
      font-weight: 700;
      text-align: center;
    }

    .matrix-dim {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: #264866;
    }

    .attn-visual-pane {
      background: radial-gradient(130% 150% at 0% 0%, #ffffff 0%, #f8f9fe 52%, #eef3fb 100%);
    }

    .attn-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .attn-eqn-pill {
      padding: 8px 12px;
      border: 3px solid #4d6e93;
      border-radius: 999px;
      background: #f6faff;
      color: #203c58;
      font-family: var(--mono);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .attn-projection-row {
      display: grid;
      grid-template-columns: auto auto minmax(300px, 1fr);
      align-items: center;
      gap: 16px;
    }

    .matrix-grid.warm {
      width: 170px;
      height: 220px;
      background:
        linear-gradient(90deg, rgba(57, 30, 15, 0.42) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(rgba(57, 30, 15, 0.42) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(140deg, #db8a77 0%, #d07d69 55%, #bf6b58 100%);
      border-color: #6f4750;
    }

    .head-bank {
      border: 1px solid #c4d2e3;
      border-radius: 10px;
      background: #f7fbff;
      padding: 10px;
      display: grid;
      gap: 8px;
      justify-items: center;
    }

    .head-stack-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(48px, 1fr));
      gap: 6px;
      align-items: end;
    }

    .head-card {
      height: 68px;
      border: 1.5px solid #3c4f73;
      border-radius: 4px;
      background:
        linear-gradient(90deg, rgba(15, 12, 40, 0.34) 1px, transparent 1px) 0 0 / 12px 12px,
        linear-gradient(rgba(15, 12, 40, 0.34) 1px, transparent 1px) 0 0 / 12px 12px,
        linear-gradient(125deg, #6a4bb6 0%, #5639a6 52%, #df8f78 52%, #cf7b66 100%);
    }

    .head-card.more {
      display: grid;
      place-items: center;
      background: #edf3fb;
      color: #37516d;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
    }

    .attn-subtitle {
      font-size: 0.76rem;
      color: #2a4562;
      font-family: var(--mono);
      text-align: center;
    }

    .attn-scale-box {
      border: 1px solid #bccde0;
      border-radius: 10px;
      background: #fdfefe;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .attn-scale-title {
      margin: 0;
      font-size: 1.05rem;
      color: #243f5c;
    }

    .attn-scale-flow {
      display: grid;
      grid-template-columns: auto auto auto auto auto auto auto auto auto;
      align-items: center;
      gap: 8px;
    }

    .matrix-grid.attn-small {
      width: 78px;
      height: 116px;
      background:
        linear-gradient(90deg, rgba(16, 10, 37, 0.36) 1px, transparent 1px) 0 0 / 11px 11px,
        linear-gradient(rgba(16, 10, 37, 0.36) 1px, transparent 1px) 0 0 / 11px 11px,
        linear-gradient(130deg, #6a4ab7 0%, #5a3aa9 56%, #d88874 56%, #c77260 100%);
      border-color: #4b366f;
    }

    .matrix-grid.score {
      width: 96px;
      height: 96px;
      background:
        linear-gradient(90deg, rgba(16, 10, 37, 0.3) 1px, transparent 1px) 0 0 / 12px 12px,
        linear-gradient(rgba(16, 10, 37, 0.3) 1px, transparent 1px) 0 0 / 12px 12px,
        linear-gradient(135deg, #ece5ff 0%, #b79ee8 48%, #da8c78 48%, #cd7763 100%);
      border-color: #6c5b8d;
    }

    .softmax-chip {
      border: 1px solid #9bb1c8;
      border-radius: 7px;
      background: #f8fbff;
      color: #284563;
      font-family: var(--mono);
      font-size: 0.77rem;
      padding: 6px 8px;
      text-align: center;
      white-space: nowrap;
    }

    .flow-arrow-mini {
      font-size: 1.4rem;
      color: #4b6887;
      font-family: var(--mono);
      line-height: 1;
      text-align: center;
    }

    .mix-visual-pane {
      background: radial-gradient(140% 150% at 0% 0%, #ffffff 0%, #f8fbff 52%, #edf5ff 100%);
    }

    .mix-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mix-eqn-pill {
      padding: 8px 12px;
      border: 3px solid #4d6e93;
      border-radius: 999px;
      background: #f6faff;
      color: #203c58;
      font-family: var(--mono);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .mix-flow {
      display: grid;
      grid-template-columns: auto auto auto auto auto auto auto;
      align-items: center;
      gap: 12px;
    }

    .head-column {
      display: grid;
      gap: 7px;
      justify-items: center;
    }

    .head-list {
      display: grid;
      gap: 6px;
    }

    .head-mini {
      width: 118px;
      height: 34px;
      border: 1.8px solid #2b4b6b;
      border-radius: 4px;
      background:
        linear-gradient(90deg, rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 14px 14px,
        linear-gradient(rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 14px 14px,
        linear-gradient(90deg, #5a9ce0 0 70%, #f2a12f 70% 100%);
    }

    .head-mini.more {
      display: grid;
      place-items: center;
      background: #edf3fb;
      color: #37516d;
      font-family: var(--mono);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .matrix-grid.mix-mid {
      width: 188px;
      height: 188px;
      background:
        linear-gradient(90deg, rgba(24, 35, 55, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(rgba(24, 35, 55, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(120deg, #6ba7eb 0%, #679cd7 42%, #8a67c5 100%);
    }

    .ffn-lane {
      min-width: 200px;
      border: 2px solid #567d56;
      border-radius: 16px;
      background: radial-gradient(120% 120% at 20% 20%, #dff5d9 0%, #bfe3b3 58%, #b2dba5 100%);
      padding: 10px 10px 8px;
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .ffn-lane h5 {
      margin: 0;
      font-size: 0.82rem;
      color: #1e441f;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .ffn-track {
      position: relative;
      display: grid;
      grid-template-columns: 36px 60px 36px;
      column-gap: 18px;
      align-items: start;
      justify-items: center;
      width: 168px;
      min-height: 134px;
    }

    .ffn-col {
      display: grid;
      justify-items: center;
      gap: 6px;
      z-index: 2;
    }

    .ffn-bar-wrap {
      width: 36px;
      height: 112px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ffn-bar {
      width: 18px;
      border: 2px solid #395f37;
      border-radius: 5px;
      background: linear-gradient(140deg, #83c66f 0%, #75ba62 100%);
    }

    .ffn-bar.x {
      height: 36px;
    }

    .ffn-bar.mid {
      height: 112px;
    }

    .ffn-size {
      color: #123214;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
    }

    .ffn-links {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 112px;
      z-index: 1;
      pointer-events: none;
    }

    .ffn-links line {
      stroke: rgba(26, 63, 29, 0.6);
      stroke-width: 1.2;
    }

    .ffn-foot {
      margin: 0;
      color: #214621;
      font-size: 0.78rem;
      text-align: center;
      font-family: var(--mono);
      line-height: 1.25;
    }

    .matrix-grid.mix-final {
      width: 172px;
      height: 172px;
      background:
        linear-gradient(90deg, rgba(24, 35, 55, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(rgba(24, 35, 55, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(120deg, #66a8ef 0%, #6a9fdc 52%, #8c69cb 100%);
    }

    .mix-repeat-note {
      border-top: 1px dashed #bfd0e1;
      padding-top: 8px;
      font-family: var(--mono);
      color: #2b4764;
      font-size: 0.78rem;
      text-align: center;
    }

    .unembed-visual-pane {
      background: radial-gradient(140% 150% at 0% 0%, #ffffff 0%, #f9f8ff 52%, #edf2fb 100%);
      overflow: hidden;
    }

    .unembed-eqn-bar {
      margin: -12px -12px 4px;
      background: #0f141a;
      color: #f7fbff;
      font-family: var(--mono);
      font-size: 0.92rem;
      padding: 8px 12px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .unembed-title {
      margin: 0;
      font-size: 1.18rem;
      color: #162f49;
      letter-spacing: 0.01em;
    }

    .unembed-flow {
      display: grid;
      grid-template-columns: auto auto auto auto auto auto auto;
      align-items: center;
      gap: 10px;
    }

    .matrix-grid.final-blue {
      width: 190px;
      height: 170px;
      background:
        linear-gradient(90deg, rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(140deg, #6caef0 0%, #63a1df 55%, #5890c9 100%);
    }

    .slice-strip {
      width: 190px;
      height: 26px;
      border: 2px solid #35526f;
      border-radius: 5px;
      background:
        linear-gradient(90deg, rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 20px 20px,
        linear-gradient(90deg, #67a9ed 0 78%, #f0a230 78% 100%);
      margin-top: 6px;
      box-shadow: 0 0 0 2px rgba(240, 162, 48, 0.25);
    }

    .matrix-grid.last-slice {
      width: 30px;
      height: 170px;
      background:
        linear-gradient(180deg, rgba(17, 28, 42, 0.34) 1px, transparent 1px) 0 0 / 100% 19px,
        linear-gradient(180deg, #67a9ed 0 78%, #f0a230 78% 100%);
    }

    .matrix-grid.unembed-purple {
      width: 210px;
      height: 210px;
      background:
        linear-gradient(90deg, rgba(31, 16, 57, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(rgba(31, 16, 57, 0.38) 1px, transparent 1px) 0 0 / 22px 22px,
        linear-gradient(130deg, #be81e9 0%, #b577df 58%, #a868d0 100%);
      border-color: #6c4f92;
    }

    .logit-vector-box {
      width: 360px;
      border: 2px solid #8f85a9;
      border-radius: 4px;
      background: #f8f5ff;
      padding: 10px;
      display: grid;
      gap: 8px;
    }

    .logit-vector-bar {
      height: 34px;
      border: 2px solid #6f5a8f;
      border-radius: 2px;
      background: linear-gradient(90deg, #bc79e4 0%, #a76ed9 52%, #b27adf 100%);
    }

    .isolate-note {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #2b4662;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
    }

    .pred-visual-pane {
      background: radial-gradient(140% 150% at 0% 0%, #ffffff 0%, #f8f9ff 52%, #edf2fb 100%);
    }

    .pred-header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pred-eqn-pill {
      padding: 8px 12px;
      border: 3px solid #4d6e93;
      border-radius: 999px;
      background: #f6faff;
      color: #203c58;
      font-family: var(--mono);
      font-size: 0.86rem;
      white-space: nowrap;
    }

    .pred-flow {
      display: grid;
      grid-template-columns: repeat(6, auto);
      align-items: end;
      gap: 10px;
    }

    .logit-tower {
      width: 108px;
      height: 300px;
      border: 2px solid #3d3569;
      border-radius: 3px;
      background:
        linear-gradient(180deg, rgba(230, 222, 255, 0.85) 1px, transparent 1px) 0 0 / 100% 22px,
        linear-gradient(160deg, #6f4cd0 0%, #5a3ab3 56%, #412a88 100%);
      position: relative;
    }

    .logit-tower::after {
      content: "";
      position: absolute;
      left: -2px;
      right: -2px;
      bottom: 38px;
      border-bottom: 2px dotted #d2def0;
    }

    .pred-vector {
      width: 220px;
      height: 28px;
      border: 2px solid #4d3a8a;
      border-radius: 2px;
      background: linear-gradient(90deg, #5f40b6 0%, #6d48c8 54%, #7f54d8 100%);
    }

    .softmax-card {
      width: 74px;
      height: 76px;
      border: 2px solid #6f88a4;
      border-radius: 3px;
      background: #edf5ff;
      display: grid;
      place-items: center;
      font-family: var(--mono);
      color: #2d4e70;
      font-size: 0.72rem;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.1;
    }

    .sampling-mark {
      font-family: var(--mono);
      color: #2d4e70;
      font-size: 1.7rem;
      line-height: 1;
    }

    .token-out {
      font-family: var(--mono);
      font-size: 2rem;
      color: #5a2f90;
      font-weight: 800;
      white-space: nowrap;
      line-height: 1;
    }

    @media (max-width: 1020px) {
      .controls-grid { grid-template-columns: repeat(4, minmax(120px, 1fr)); }
    }

    @media (max-width: 760px) {
      .controls-grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .input-detail-layout { grid-template-columns: 1fr; }
      .embed-flow { grid-template-columns: 1fr; justify-items: center; }
      .math-op { margin-top: 0; }
      .pos-header-row { align-items: flex-start; }
      .pos-eqn-pill { white-space: normal; }
      .attn-header-row { align-items: flex-start; }
      .attn-eqn-pill { white-space: normal; }
      .attn-projection-row { grid-template-columns: 1fr; justify-items: center; }
      .attn-scale-flow { grid-template-columns: 1fr; justify-items: center; }
      .mix-header-row { align-items: flex-start; }
      .mix-eqn-pill { white-space: normal; }
      .mix-flow { grid-template-columns: 1fr; justify-items: center; }
      .unembed-flow { grid-template-columns: 1fr; justify-items: center; }
      .logit-vector-box { width: 100%; max-width: 360px; }
      .pred-header-row { align-items: flex-start; }
      .pred-eqn-pill { white-space: normal; }
      .pred-flow { grid-template-columns: 1fr; justify-items: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header card">
      <button class="toggle-btn" id="toggleSidebar" type="button" aria-label="Toggle controls" title="Toggle controls">☰</button>
      <h1>Transformer models</h1>
    </header>

    <section class="controls card" id="sidebar">
      <div class="preset-row" id="presetRow">
        <button class="preset-btn active" type="button" data-preset="attention">Attention</button>
        <button class="preset-btn" type="button" data-preset="gpt2">GPT-2</button>
        <button class="preset-btn" type="button" data-preset="gpt3">GPT-3</button>
        <button class="preset-btn" type="button" data-preset="llama8b">Llama-8B</button>
        <button class="preset-btn" type="button" data-preset="llama70b">Llama-70B</button>
        <button class="preset-btn" type="button" data-preset="llama405b">Llama-405B</button>
      </div>
      <div class="controls-grid">
        <label>Input token length (n)
          <input id="tokenLength" type="number" min="1" step="1" value="70000">
        </label>
        <label>Vocab size
          <input id="vocabSize" type="number" min="2" step="1" value="250000">
        </label>
        <label>Embedding dim (d)
          <input id="embeddingDim" type="number" min="1" step="1" value="900">
        </label>
        <label>Heads (h)
          <input id="headCount" type="number" min="1" step="1" value="9">
        </label>
        <label>Head dim (derived d/h)
          <input id="headDimDisplay" type="text" readonly value="100">
        </label>
        <label>Layers
          <input id="layerCount" type="number" min="1" step="1" value="40">
        </label>
        <div class="toggle-cell">
          <span>Parameters</span>
          <label class="pill-toggle" for="parametersToggle">
            <input id="parametersToggle" type="checkbox">
            <span id="parametersState">OFF</span>
          </label>
        </div>
      </div>
    </section>

    <section class="diagram card">
      <div class="pipeline-shell" id="topRow">
        <svg class="pipeline-svg" viewBox="0 0 1560 430" role="img" aria-label="Transformer base pipeline">
          <defs>
            <marker id="loopArrowhead" viewBox="0 0 8 6" refX="7" refY="3" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
              <path d="M0,0 L8,3 L0,6 z" fill="#4e7094"></path>
            </marker>
          </defs>

          <line class="main-line" x1="88" y1="155" x2="1212" y2="155"></line>

          <g aria-label="Token array">
            <text class="prediction-title" x="37" y="42">Input</text>
            <rect class="token-shell" x="18" y="58" width="38" height="198"></rect>
            <rect class="token-cell-blue" x="20" y="76" width="34" height="30"></rect>
            <rect class="token-cell-blue" x="20" y="106" width="34" height="30"></rect>
            <rect class="token-cell-blue" x="20" y="136" width="34" height="30"></rect>
            <rect class="token-cell-blue" x="20" y="166" width="34" height="30"></rect>
            <rect class="token-cell-blue" x="20" y="196" width="34" height="30"></rect>
            <rect class="token-cell-orange" x="20" y="226" width="34" height="28"></rect>
            <text class="token-count" id="tokensLength" x="37" y="292">70,000</text>
            <text class="token-label" x="37" y="308">tokens</text>
          </g>

          <g id="embeddingBlock" class="stage-group" data-stage="embedding" aria-label="Embedding">
            <circle class="node" cx="170" cy="155" r="58"></circle>
            <text class="node-title" x="170" y="160">Embedding</text>
            <rect class="stage-hit" x="102" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <g id="positionalBlock" class="stage-group" data-stage="positional" aria-label="Positional encoding">
            <circle class="node" cx="360" cy="155" r="58"></circle>
            <text class="node-title" x="360" y="152">Positional</text>
            <text class="node-title" x="360" y="174">Encoding</text>
            <rect class="stage-hit" x="292" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <g id="attentionBlock" class="stage-group" data-stage="attention" aria-label="Attention block">
            <text class="repeat-title" id="repeatTimes" x="650" y="47">40 TIMES</text>
            <path class="loop-arrow" d="M740 97 V76 Q740 62 726 62 H570 Q550 62 550 82 V95" marker-end="url(#loopArrowhead)"></path>

            <circle class="node" cx="550" cy="155" r="58"></circle>
            <text class="node-title" x="550" y="148">Transformer</text>
            <text class="node-title" x="550" y="167">Block</text>
            <text class="node-title" x="550" y="186">(Attention)</text>
            <rect class="stage-hit" x="482" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <g id="mixingBlock" class="stage-group" data-stage="mixing" aria-label="Mixing and FFN block">
            <circle class="node" cx="740" cy="155" r="58"></circle>
            <text class="node-title" x="740" y="160">Mixing &amp; FFN</text>
            <rect class="stage-hit" x="672" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <g id="outputBlock" class="stage-group" data-stage="output" aria-label="Output processing">
            <circle class="node" cx="930" cy="155" r="58"></circle>
            <text class="node-title" x="930" y="160">Unembedding</text>
            <rect class="stage-hit" x="862" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <g id="predictionStage" class="stage-group" data-stage="prediction" aria-label="Prediction stage">
            <circle class="node" cx="1120" cy="155" r="58"></circle>
            <text class="node-title" x="1120" y="160">Prediction</text>
            <rect class="stage-hit" x="1052" y="82" width="136" height="250" rx="26"></rect>
          </g>

          <text class="flow-arrow" x="265" y="155">→</text>
          <text class="flow-arrow" x="455" y="155">→</text>
          <text class="flow-arrow" x="645" y="155">→</text>
          <text class="flow-arrow" x="835" y="155">→</text>
          <text class="flow-arrow" x="1025" y="155">→</text>

          <g aria-label="Predicted token output">
            <rect class="prediction-token-box" x="1316" y="126" width="88" height="58" rx="8" ry="8"></rect>
            <text class="prediction-token-text" id="predictedTokenId" x="1360" y="155">1347</text>
            <text class="prediction-metric" id="totalParamsText" x="1360" y="342">-</text>
            <text class="prediction-metric" id="totalFlopsText" x="1360" y="366">-</text>
          </g>
          <g class="stage-metrics" aria-label="Per-stage parameter and FLOP counts">
            <text class="metrics-row-label" x="118" y="342">Params (B)</text>
            <text class="metrics-row-label" x="118" y="366">FLOPs (TFLOPs)</text>
            <text class="metrics-value" id="embeddingParams" x="170" y="342">-</text>
            <text class="metrics-value" id="positionalParams" x="360" y="342">-</text>
            <text class="metrics-value" id="attentionParams" x="550" y="342">-</text>
            <text class="metrics-value" id="mixingParams" x="740" y="342">-</text>
            <text class="metrics-value" id="outputParams" x="930" y="342">-</text>
            <text class="metrics-value" id="predictionParams" x="1120" y="342">-</text>
            <text class="metrics-value" id="embeddingFlops" x="170" y="366">-</text>
            <text class="metrics-value" id="positionalFlops" x="360" y="366">-</text>
            <text class="metrics-value" id="attentionFlops" x="550" y="366">-</text>
            <text class="metrics-value" id="mixingFlops" x="740" y="366">-</text>
            <text class="metrics-value" id="outputFlops" x="930" y="366">-</text>
            <text class="metrics-value" id="predictionFlops" x="1120" y="366">-</text>
          </g>
        </svg>
      </div>

      <section class="details" id="detailsPanel" hidden>
        <h3 id="detailsTitle">Details</h3>
        <div class="detail-grid" id="detailGrid"></div>
      </section>
    </section>
  </div>

  <script>
    const PRESETS = {
      attention: { tokenLength: 70000, vocabSize: 250000, embeddingDim: 900, headCount: 9, layerCount: 40 },
      gpt2: { tokenLength: 1024, vocabSize: 50257, embeddingDim: 1600, headCount: 25, layerCount: 48 },
      gpt3: { tokenLength: 2048, vocabSize: 50257, embeddingDim: 12288, headCount: 96, layerCount: 96 },
      llama8b: { tokenLength: 8192, vocabSize: 128256, embeddingDim: 4096, headCount: 32, layerCount: 32 },
      llama70b: { tokenLength: 8192, vocabSize: 128256, embeddingDim: 8192, headCount: 64, layerCount: 80 },
      llama405b: { tokenLength: 8192, vocabSize: 128256, embeddingDim: 16384, headCount: 128, layerCount: 126 },
    };

    const defaults = { ...PRESETS.attention };

    const FIXED_FFN_EXPANSION = 4;

    function random4Digit() {
      return 1000 + Math.floor(Math.random() * 9000);
    }

    const state = {
      controlsCollapsed: false,
      selectedStage: null,
      showParameters: true,
      predictedToken: random4Digit(),
      selectedPreset: "attention",
    };

    const $ = (id) => document.getElementById(id);

    const ui = {
      toggleSidebar: $("toggleSidebar"),
      sidebar: $("sidebar"),
      presetButtons: Array.from(document.querySelectorAll(".preset-btn")),
      tokenLength: $("tokenLength"),
      vocabSize: $("vocabSize"),
      embeddingDim: $("embeddingDim"),
      headCount: $("headCount"),
      headDimDisplay: $("headDimDisplay"),
      layerCount: $("layerCount"),
      parametersToggle: $("parametersToggle"),
      parametersState: $("parametersState"),
      tokensLength: $("tokensLength"),
      repeatTimes: $("repeatTimes"),
      predictedTokenId: $("predictedTokenId"),
      totalParamsText: $("totalParamsText"),
      totalFlopsText: $("totalFlopsText"),
      embeddingBlock: $("embeddingBlock"),
      positionalBlock: $("positionalBlock"),
      attentionBlock: $("attentionBlock"),
      mixingBlock: $("mixingBlock"),
      outputBlock: $("outputBlock"),
      predictionStage: $("predictionStage"),
      embeddingParams: $("embeddingParams"),
      positionalParams: $("positionalParams"),
      attentionParams: $("attentionParams"),
      mixingParams: $("mixingParams"),
      outputParams: $("outputParams"),
      predictionParams: $("predictionParams"),
      embeddingFlops: $("embeddingFlops"),
      positionalFlops: $("positionalFlops"),
      attentionFlops: $("attentionFlops"),
      mixingFlops: $("mixingFlops"),
      outputFlops: $("outputFlops"),
      predictionFlops: $("predictionFlops"),
      detailsPanel: $("detailsPanel"),
      detailsTitle: $("detailsTitle"),
      detailGrid: $("detailGrid"),
    };

    function toInt(value, fallback, min = 1) {
      const parsed = Number.parseInt(value, 10);
      if (!Number.isFinite(parsed)) return fallback;
      return Math.max(min, parsed);
    }

    function fmtInt(value) {
      return Math.round(value).toLocaleString("en-US");
    }

    function fmtDim(value) {
      if (Math.abs(value - Math.round(value)) < 1e-9) return fmtInt(value);
      return value.toFixed(2).replace(/\.00$/, "");
    }

    function shape(r, c) {
      return `${fmtDim(r)} x ${fmtDim(c)}`;
    }

    function fmtBillions(value) {
      return (value / 1e9).toFixed(2);
    }

    function fmtTFLOPs(value) {
      return (value / 1e12).toFixed(2);
    }

    function readConfig() {
      return {
        tokenLength: toInt(ui.tokenLength.value, defaults.tokenLength, 1),
        vocabSize: toInt(ui.vocabSize.value, defaults.vocabSize, 2),
        embeddingDim: toInt(ui.embeddingDim.value, defaults.embeddingDim, 1),
        headCount: toInt(ui.headCount.value, defaults.headCount, 1),
        layerCount: toInt(ui.layerCount.value, defaults.layerCount, 1),
      };
    }

    function compute(config) {
      const n = config.tokenLength;
      const d = config.embeddingDim;
      const h = config.headCount;
      const dh = d / h;
      const layers = config.layerCount;
      const dff = d * FIXED_FFN_EXPANSION;
      const concatDim = h * dh;
      const logits = n * config.vocabSize;
      const predictedToken = state.predictedToken;

      return {
        n,
        d,
        h,
        dh,
        layers,
        dff,
        concatDim,
        logits,
        predictedToken,
        integerHeadDim: Number.isInteger(dh),
      };
    }

    function setActiveBlock() {
      [ui.embeddingBlock, ui.positionalBlock, ui.attentionBlock, ui.mixingBlock, ui.outputBlock, ui.predictionStage].forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.stage === state.selectedStage);
      });
    }

    function setPresetSelection(name) {
      ui.presetButtons.forEach((btn) => {
        btn.classList.toggle("active", name && btn.dataset.preset === name);
      });
    }

    function applyPreset(name) {
      const preset = PRESETS[name];
      if (!preset) return;
      ui.tokenLength.value = preset.tokenLength;
      ui.vocabSize.value = preset.vocabSize;
      ui.embeddingDim.value = preset.embeddingDim;
      ui.headCount.value = preset.headCount;
      ui.layerCount.value = preset.layerCount;
      state.selectedPreset = name;
      setPresetSelection(name);
      render();
    }

    function renderStageMetrics(config, vm) {
      const embeddingParams = config.vocabSize * vm.d;
      const embeddingFlops = vm.n * vm.d;

      const positionalParams = 0;
      const positionalFlops = vm.n * vm.d;

      const attnParamsPerLayer = 4 * vm.d * vm.d;
      const attnFlopsPerLayer = (4 * vm.n * vm.d * vm.d) + (2 * vm.n * vm.n * vm.d);
      const attentionParams = vm.layers * attnParamsPerLayer;
      const attentionFlops = vm.layers * attnFlopsPerLayer;

      const mixingParamsPerLayer = (vm.d * vm.d) + (2 * vm.d * vm.dff);
      const mixingFlopsPerLayer = (vm.n * vm.d * vm.d) + (2 * vm.n * vm.d * vm.dff);
      const mixingParams = vm.layers * mixingParamsPerLayer;
      const mixingFlops = vm.layers * mixingFlopsPerLayer;

      const outputParams = vm.d * config.vocabSize;
      const outputFlops = vm.d * config.vocabSize;

      const predictionParams = 0;
      const predictionFlops = 3 * config.vocabSize;
      const totalParams = embeddingParams + positionalParams + attentionParams + mixingParams + predictionParams;
      const totalFlops = embeddingFlops + positionalFlops + attentionFlops + mixingFlops + outputFlops + predictionFlops;

      ui.embeddingParams.textContent = fmtBillions(embeddingParams);
      ui.positionalParams.textContent = fmtBillions(positionalParams);
      ui.attentionParams.textContent = fmtBillions(attentionParams);
      ui.mixingParams.textContent = fmtBillions(mixingParams);
      ui.outputParams.textContent = fmtBillions(outputParams);
      ui.predictionParams.textContent = fmtBillions(predictionParams);

      ui.embeddingFlops.textContent = fmtTFLOPs(embeddingFlops);
      ui.positionalFlops.textContent = fmtTFLOPs(positionalFlops);
      ui.attentionFlops.textContent = fmtTFLOPs(attentionFlops);
      ui.mixingFlops.textContent = fmtTFLOPs(mixingFlops);
      ui.outputFlops.textContent = fmtTFLOPs(outputFlops);
      ui.predictionFlops.textContent = fmtTFLOPs(predictionFlops);
      ui.totalParamsText.textContent = fmtBillions(totalParams);
      ui.totalFlopsText.textContent = fmtTFLOPs(totalFlops);
    }

      Object.entries(defaults).forEach(([k, v]) => {

      state.selectedPreset = "attention";
      setPresetSelection(state.selectedPreset);
      render();

      [ui.tokenLength, ui.vocabSize, ui.embeddingDim, ui.headCount, ui.layerCount].forEach((node) => {
        node.addEventListener("input", () => {
          if (state.selectedPreset) {
            state.selectedPreset = null;
            setPresetSelection(null);
          }
          render();
        });
      });

      ui.presetButtons.forEach((btn) => {
        btn.addEventListener("click", () => applyPreset(btn.dataset.preset));
      });

      [ui.embeddingBlock, ui.positionalBlock, ui.attentionBlock, ui.mixingBlock, ui.outputBlock, ui.predictionStage].forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selectedStage = state.selectedStage === btn.dataset.stage ? null : btn.dataset.stage;
          render();
        });
      });

      ui.parametersToggle.addEventListener("change", () => {
        state.showParameters = ui.parametersToggle.checked;
        render();
      });

      ui.toggleSidebar.addEventListener("click", () => {
        state.controlsCollapsed = !state.controlsCollapsed;
        ui.sidebar.classList.toggle("collapsed", state.controlsCollapsed);
      });
    }

    bindEvents();
    applyDefaults();
  </script>
</body>
</html>
